apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: wetlab-gpu-dashboard
  namespace: wetlab-monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: wetlab-grafana
  json: |
    {
      "title": "Wetlab GPU Dashboard",
      "tags": ["wetlab", "gpu", "openshift"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Wet1 GPU Temp",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP{Hostname=\"c0-47-0e-20-70-42\"}",
              "legendFormat": "GPU Temp"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "decimals": 0
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Wet2 GPU Temp",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 0 },
